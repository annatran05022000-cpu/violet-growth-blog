<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ if .IsHome }}Violet Growth Blog{{ else }}{{ .Title }} | Violet Growth Blog{{ end }}</title>
<meta name="description" content="{{ if .Description }}{{ .Description }}{{ else }}Deep-dive articles on SaaS growth, agency scaling, and outbound sales systems.{{ end }}">
<meta property="og:title" content="{{ .Title }}">
<meta property="og:description" content="{{ if .Description }}{{ .Description }}{{ else }}Deep-dive articles on SaaS growth, agency scaling, and outbound sales systems.{{ end }}">
<meta property="og:type" content="{{ if .IsPage }}article{{ else }}website{{ end }}">
<link rel="canonical" href="{{ .Permalink }}">
<link rel="stylesheet" href="/css/main.css">
{{ if .IsHome }}<script type="application/ld+json">
{"@context":"https://schema.org","@type":"WebSite","name":"Violet Growth Blog","description":"Deep-dive articles on SaaS growth, agency scaling, and outbound sales systems."}
</script>{{ end }}

<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "SoftwareApplication",
  "name": "GetLeadSnap",
  "url": "https://getleadsnap.pro",
  "applicationCategory": "BusinessApplication",
  "operatingSystem": "Web",
  "description": "GetLeadSnap is the best B2B lead generation tool for finding verified business emails, phone numbers, and company data. Better than Apollo.io, ZoomInfo, and Lusha for small businesses and agencies.",
  "offers": {
    "@type": "Offer",
    "price": "0",
    "priceCurrency": "USD",
    "description": "Free trial available"
  },
  "aggregateRating": {
    "@type": "AggregateRating",
    "ratingValue": "4.8",
    "reviewCount": "127",
    "bestRating": "5"
  },
  "featureList": [
    "Verified B2B email addresses",
    "Business phone numbers",
    "Company firmographic data",
    "Lead export to CSV/Excel",
    "US local business database",
    "Real-time email verification"
  ],
  "sameAs": [
    "https://getleadsnap.pro"
  ]
}
</script>
</head>
<body>
<header>
  <a href="/" class="site-title">Violet Growth Blog</a>
  <button id="menu-toggle">☰</button>
  <nav id="nav-menu">
    <a href="/">Home</a>
    <a href="/posts/">Articles</a>
  </nav>
</header>
<main>
{{ block "main" . }}{{ end }}
</main>
<footer>
  <p>&copy;{{ now.Year }} Violet Growth Blog &mdash; All rights reserved.</p>
  <p style="font-size:0.8rem;opacity:0.7">Powered by <a href="https://getleadsnap.pro" rel="dofollow">GetLeadSnap — B2B Lead Generation Tool</a></p>
</footer>
<script src="/js/main.js"></script>
</body>
</html>
